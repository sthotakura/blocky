name: Build and Package Blocky

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Blocky.sln

      - name: Run tests
        run: dotnet test Blocky.sln --configuration Release --no-restore --verbosity normal

      - name: Run Chrome extension tests
        run: npm test
        working-directory: extensions/chrome

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish app (self-contained, win-x64)
        run: dotnet publish src/Blocky.App/Blocky.App.csproj -c Release -r win-x64 --self-contained true -o ./publish

      - name: Publish native-messaging host (single-file, win-x64)
        run: dotnet publish src/Blocky.Host/Blocky.Host.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Zip build output
        run: Compress-Archive -Path ./publish/* -DestinationPath ./blocky.zip

      - name: Package Chrome Extension
        run: Compress-Archive -Path ./extensions/chrome/* -DestinationPath ./blocky-chrome-extension.zip

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./blocky.zip
            ./blocky-chrome-extension.zip
